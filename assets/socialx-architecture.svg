<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="720" rx="32" fill="#0F172A"/>
  <rect x="36" y="36" width="1208" height="648" rx="24" fill="#111827" stroke="#334155"/>
  <text x="72" y="100" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">SocialX Architecture</text>
  <text x="72" y="140" fill="#94A3B8" font-family="Segoe UI, Arial, sans-serif" font-size="22">React Native portfolio prototype with shared context, rich navigation, and local-first UI flows</text>

  <rect x="74" y="200" width="320" height="370" rx="24" fill="#172554" stroke="#60A5FA" stroke-width="2"/>
  <text x="104" y="252" fill="#DBEAFE" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Presentation Layer</text>
  <text x="104" y="302" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Login screen</text>
  <text x="104" y="340" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Feed and post cards</text>
  <text x="104" y="378" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Images gallery + modal</text>
  <text x="104" y="416" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Profile and settings</text>
  <text x="104" y="454" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Help and support</text>
  <text x="104" y="510" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="18">Focused on mobile UX, layout, and motion</text>

  <rect x="480" y="180" width="320" height="410" rx="24" fill="#1E293B" stroke="#38BDF8" stroke-width="2"/>
  <text x="510" y="232" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">App Core</text>
  <text x="510" y="282" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22">ThemeProvider</text>
  <text x="510" y="316" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Light/dark theme state and shared tokens</text>
  <text x="510" y="372" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22">AuthProvider</text>
  <text x="510" y="406" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Mock credentials, simulated sessions, demo login</text>
  <text x="510" y="462" fill="#F8FAFC" font-family="Segoe UI, Arial, sans-serif" font-size="22">Local feature state</text>
  <text x="510" y="496" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="18">Posts, comments, likes, gallery selection</text>
  <text x="510" y="552" fill="#E0F2FE" font-family="Segoe UI, Arial, sans-serif" font-size="18">Fast to review, easy to evolve into modules</text>

  <rect x="886" y="200" width="320" height="370" rx="24" fill="#052E16" stroke="#4ADE80" stroke-width="2"/>
  <text x="916" y="252" fill="#DCFCE7" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Platform Layer</text>
  <text x="916" y="302" fill="#ECFDF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Expo managed workflow</text>
  <text x="916" y="340" fill="#ECFDF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">• React Navigation</text>
  <text x="916" y="378" fill="#ECFDF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Moti + Reanimated</text>
  <text x="916" y="416" fill="#ECFDF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Vector icons and safe areas</text>
  <text x="916" y="454" fill="#ECFDF5" font-family="Segoe UI, Arial, sans-serif" font-size="22">• Cross-platform Expo runtime</text>
  <text x="916" y="510" fill="#86EFAC" font-family="Segoe UI, Arial, sans-serif" font-size="18">Ready for Android, iOS, and web preview</text>

  <path d="M394 386H480" stroke="#7DD3FC" stroke-width="6" stroke-linecap="round"/>
  <path d="M800 386H886" stroke="#7DD3FC" stroke-width="6" stroke-linecap="round"/>
  <circle cx="436" cy="386" r="12" fill="#38BDF8"/>
  <circle cx="843" cy="386" r="12" fill="#38BDF8"/>
